name: Plugins — Build, Sign & Deploy (official)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-channel:
    name: Resolve Channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - id: channel
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & Sign Official WASM Plugins (${{ needs.resolve-channel.outputs.channel }})
    needs: [resolve-channel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        run: |
          cargo install wasm-tools 2>/dev/null || true
          sudo apt-get update -qq && sudo apt-get install -y -qq openssl xxd 2>/dev/null || true

      - name: Build, sign & bundle each plugin
        env:
          OFFICIAL_PRIV: ${{ secrets.ROVE_TEAM_OFFICIAL_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p artifacts/plugins

          # Write official private key (hex-encoded Ed25519 seed)
          echo "$OFFICIAL_PRIV" > /tmp/official_priv.hex

          sign_payload() {
            local wasm_file="$1"
            # Compute SHA-256 hash of WASM (hex string — engine verifies sig over hash string bytes)
            local hash
            hash=$(sha256sum "$wasm_file" | cut -d' ' -f1)
            # Sign the hash string (not binary) with Ed25519 official key
            # Engine: team_public_key.verify(file_hash.as_bytes(), &signature)
            echo -n "$hash" > /tmp/hash_str.bin
            openssl pkeyutl -sign -rawin \
              -inkey <(python3 -c "
import sys, binascii
raw = open('/tmp/official_priv.hex').read().strip()
b = binascii.unhexlify(raw)
# Ed25519 raw 32-byte seed -> PEM
import base64
pem = '-----BEGIN PRIVATE KEY-----\n'
# PKCS8 Ed25519: 302e020100300506032b657004220420 + 32-byte seed
prefix = bytes.fromhex('302e020100300506032b657004220420')
der = prefix + b
pem += base64.encodebytes(der).decode()
pem += '-----END PRIVATE KEY-----\n'
sys.stdout.write(pem)
") \
              -in /tmp/hash_str.bin \
              -out /tmp/payload_sig.bin 2>/dev/null
            xxd -p /tmp/payload_sig.bin | tr -d '\n'
            rm -f /tmp/hash_str.bin /tmp/payload_sig.bin
          }

          sign_registry_json() {
            local json_file="$1"
            local signed_at
            signed_at=$(date +%s)
            # Canonicalize: strip signature/signed_at, compact + sorted keys
            CANON=$(python3 -c "
import json, sys
d = json.load(open('$json_file'))
d.pop('signature', None)
d.pop('signed_at', None)
sys.stdout.write(json.dumps(d, sort_keys=True, separators=(',',':')))
")
            echo -n "$CANON" > /tmp/canon.bin
            openssl pkeyutl -sign -rawin \
              -inkey <(python3 -c "
import sys, binascii, base64
raw = open('/tmp/official_priv.hex').read().strip()
b = binascii.unhexlify(raw)
prefix = bytes.fromhex('302e020100300506032b657004220420')
der = prefix + b
pem = '-----BEGIN PRIVATE KEY-----\n' + base64.encodebytes(der).decode() + '-----END PRIVATE KEY-----\n'
sys.stdout.write(pem)
") \
              -in /tmp/canon.bin \
              -out /tmp/reg_sig.bin 2>/dev/null
            SIG=$(xxd -p /tmp/reg_sig.bin | tr -d '\n')
            rm -f /tmp/canon.bin /tmp/reg_sig.bin
            python3 -c "
import json
d = json.load(open('$json_file'))
d['signed_at'] = $signed_at
d['signature'] = '$SIG'
open('$json_file','w').write(json.dumps(d, indent=2))
"
          }

          TIMESTAMP=$(date +%s)
          REGISTRY_DIR="artifacts/registry"
          mkdir -p "$REGISTRY_DIR"

          for plugin_dir in */; do
            [ ! -f "${plugin_dir}Cargo.toml" ] && continue
            [ ! -f "${plugin_dir}manifest.json" ] && continue
            plugin_name=$(basename "$plugin_dir" | tr -d '/')

            echo "=== Building: $plugin_name ==="
            (cd "$plugin_dir" && cargo build --target wasm32-wasip1 --release)

            version=$(python3 -c "import json; print(json.load(open('${plugin_dir}manifest.json'))['version'])")
            wasm_name=$(echo "$plugin_name" | tr '-' '_')
            wasm_src="${plugin_dir}target/wasm32-wasip1/release/${wasm_name}.wasm"

            [ ! -f "$wasm_src" ] && echo "  WARN: no wasm at $wasm_src, skipping" && continue

            # Validate WASM
            wasm-tools validate "$wasm_src" || true

            # Compute payload hash (SHA-256 hex)
            payload_hash=$(sha256sum "$wasm_src" | cut -d' ' -f1)

            # Sign payload (Official key — verify_file_signature always uses team_public_key)
            payload_sig=$(sign_payload "$wasm_src")

            # Build bundle dir: artifacts/plugins/{plugin_name}/{version}/
            bundle_dir="artifacts/plugins/${plugin_name}/${version}"
            mkdir -p "$bundle_dir"

            # Copy WASM
            cp "$wasm_src" "$bundle_dir/${wasm_name}.wasm"

            # Copy manifest.json (already signed or dev placeholder)
            cp "${plugin_dir}manifest.json" "$bundle_dir/manifest.json"

            # Copy runtime.json if present
            runtime_rel=""
            if [ -f "${plugin_dir}runtime.json" ]; then
              cp "${plugin_dir}runtime.json" "$bundle_dir/runtime.json"
              runtime_rel="runtime.json"
            fi

            # Copy README if present
            readme_rel=""
            if [ -f "${plugin_dir}README.md" ]; then
              cp "${plugin_dir}README.md" "$bundle_dir/README.md"
              readme_rel="README.md"
            fi

            # Generate plugin-package.json
            plugin_id=$(echo "$plugin_name" | tr '_' '-')
            cat > "$bundle_dir/plugin-package.json" <<PKGJSON
{
  "id": "${plugin_id}",
  "artifact": "${wasm_name}.wasm",
  "runtime_config": "${runtime_rel}",
  "payload_hash": "${payload_hash}",
  "payload_signature": "${payload_sig}",
  "enabled": true
}
PKGJSON

            # Generate release.json and sign it
            trust_tier=$(python3 -c "import json; print(json.load(open('${plugin_dir}manifest.json')).get('trust_tier','Official'))")
            cat > "$bundle_dir/release.json" <<RELJSON
{
  "id": "${plugin_id}",
  "name": "${plugin_name}",
  "version": "${version}",
  "plugin_type": "Workspace",
  "trust_tier": "${trust_tier}",
  "generated_at": ${TIMESTAMP},
  "signed_at": 0,
  "signature": "",
  "artifact": "${wasm_name}.wasm",
  "runtime_config": "${runtime_rel}"
}
RELJSON
            sign_registry_json "$bundle_dir/release.json"

            # Update per-plugin registry index
            plugin_id_safe=$(echo "$plugin_id")
            mkdir -p "$REGISTRY_DIR/${plugin_id_safe}"
            index_file="$REGISTRY_DIR/${plugin_id_safe}/index.json"
            bundle_rel="${plugin_id_safe}/${version}"

            artifact_path_entry="${bundle_rel}/${wasm_name}.wasm"
            runtime_path_entry=""
            [ -n "$runtime_rel" ] && runtime_path_entry="${bundle_rel}/runtime.json"
            readme_path_entry=""
            [ -n "$readme_rel" ] && readme_path_entry="${bundle_rel}/README.md"

            python3 - <<PYEOF
import json, time, os

index_file = "$index_file"
plugin_id = "$plugin_id_safe"
plugin_name = "$plugin_name"
version = "$version"
trust_tier = "$trust_tier"
bundle_rel = "$bundle_rel"
timestamp = $TIMESTAMP
artifact_path_entry = "$artifact_path_entry"
runtime_path_entry = "$runtime_path_entry"
readme_path_entry = "$readme_path_entry"

try:
    idx = json.load(open(index_file))
except:
    idx = {
        "schema_version": "1",
        "generated_at": timestamp,
        "signed_at": 0,
        "signature": "",
        "plugin": {
            "id": plugin_id,
            "name": plugin_name,
            "plugin_type": "Workspace",
            "trust_tier": trust_tier,
            "latest_version": version,
            "index_path": f"{plugin_id}/index.json"
        },
        "versions": []
    }

idx["generated_at"] = timestamp
idx["plugin"]["latest_version"] = version
idx["plugin"]["trust_tier"] = trust_tier

# Remove existing entry for this version
idx["versions"] = [v for v in idx["versions"] if v["version"] != version]
idx["versions"].insert(0, {
    "version": version,
    "published_at": timestamp,
    "bundle_path": bundle_rel,
    "manifest_path": f"{bundle_rel}/manifest.json",
    "package_path": f"{bundle_rel}/plugin-package.json",
    "runtime_path": runtime_path_entry if runtime_path_entry else None,
    "artifact_path": artifact_path_entry if artifact_path_entry else None,
    "artifact_sidecar_path": None,
    "readme_path": readme_path_entry if readme_path_entry else None,
    "release_path": f"{bundle_rel}/release.json"
})

# Sort versions descending
try:
    from packaging.version import Version as V
    idx["versions"].sort(key=lambda x: V(x["version"]), reverse=True)
except:
    idx["versions"].sort(key=lambda x: x["version"], reverse=True)

open(index_file, "w").write(json.dumps(idx, indent=2))
PYEOF

            # Sign the index
            sign_registry_json "$index_file"

            # Copy bundle into registry dir
            mkdir -p "$REGISTRY_DIR/${plugin_id_safe}/${version}"
            cp -r "$bundle_dir/." "$REGISTRY_DIR/${plugin_id_safe}/${version}/"

            echo "  ✓ $plugin_name v$version"
          done

          # Generate/update top-level registry.json catalog
          python3 - <<PYEOF2
import json, os, glob

registry_dir = "artifacts/registry"
timestamp = $TIMESTAMP

catalog_file = f"{registry_dir}/registry.json"
try:
    catalog = json.load(open(catalog_file))
except:
    catalog = {
        "schema_version": "1",
        "generated_at": timestamp,
        "signed_at": 0,
        "signature": "",
        "plugins": []
    }

catalog["generated_at"] = timestamp

# Rebuild plugins list from index files
plugins = []
for index_file in glob.glob(f"{registry_dir}/*/index.json"):
    try:
        idx = json.load(open(index_file))
        plugins.append(idx["plugin"])
    except:
        pass

plugins.sort(key=lambda x: x.get("name",""))
catalog["plugins"] = plugins
open(catalog_file, "w").write(json.dumps(catalog, indent=2))
PYEOF2

          sign_registry_json "artifacts/registry/registry.json"

          # Clean up key
          shred -u /tmp/official_priv.hex 2>/dev/null || rm -f /tmp/official_priv.hex

          echo "=== Bundle summary ==="
          find artifacts/ -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ needs.resolve-channel.outputs.channel }}
          path: artifacts/
          retention-days: 1

  deploy:
    name: Deploy to R2 (${{ needs.resolve-channel.outputs.channel }})
    needs: [resolve-channel, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: plugins-${{ needs.resolve-channel.outputs.channel }}
          path: artifacts/

      - name: Prepare R2 layout
        env:
          CHANNEL: ${{ needs.resolve-channel.outputs.channel }}
        run: |
          mkdir -p ".r2_upload/${CHANNEL}"
          # Deploy registry tree (registry.json + per-plugin index + bundles)
          cp -r artifacts/registry/. ".r2_upload/${CHANNEL}/plugins/" 2>/dev/null || true
          find .r2_upload -type f | sort

      - name: Deploy to Cloudflare R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.REGISTRY_R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: "auto"
          AWS_S3_ENDPOINT: ${{ secrets.R2_API_URL }}
          SOURCE_DIR: ".r2_upload"

  update-registry:
    name: Update Registry Repo (${{ needs.resolve-channel.outputs.channel }})
    needs: [resolve-channel, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: plugins-${{ needs.resolve-channel.outputs.channel }}
          path: artifacts/

      - name: Push to registry repo
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
          CHANNEL: ${{ needs.resolve-channel.outputs.channel }}
        run: |
          set -e
          git clone https://x-access-token:${REGISTRY_PAT}@github.com/rovehq/registry.git /tmp/registry

          COMMIT=$(git rev-parse --short HEAD)

          # Sync plugin registry tree into channel subtree of registry repo
          mkdir -p "/tmp/registry/${CHANNEL}/plugins"
          cp -r artifacts/registry/. "/tmp/registry/${CHANNEL}/plugins/"

          cd /tmp/registry
          git config user.name "rove-ci"
          git config user.email "ci@roveai.co"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to registry."
          else
            git commit -m "release(${CHANNEL}): official plugins (${COMMIT})"
            git push
          fi
